name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  docker-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build verification image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: verify
          tags: ai-workflow-log-analyzer:verify
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run repository verification
        run: docker run --rm ai-workflow-log-analyzer:verify
