# AI Workflow Automation Configuration

project:
  name: "ai_workflow_log_analyzer"
  type: "typescript-tool"
  kind: "log_analysis_tui"  # domain: interactive TUI for ai_workflow.js log analysis
  version: "0.2.2"          # keep in sync with package.json
  description: "Developer-facing interactive TUI tool for internal contributors to analyze ai_workflow.js execution logs — surfaces failures, bugs, prompt quality issues, and performance regressions using the GitHub Copilot SDK"

tech_stack:
  primary_language: "typescript"
  build_system: "tsc"           # tsc compiles src/**/*.ts → dist/
  runtime: "tsx"                # tsx used for dev/start (no build step required)
  ui_framework: "ink"           # React for terminal UIs
  test_framework: "jest"
  test_runner: "ts-jest"
  test_command: "npm test"
  lint_command: "npm run lint"
  lint_commands:
    typescript: "npm run lint"  # ESLint with TypeScript plugin

structure:
  source_dirs:
    - src
  test_dirs:
    - test
  docs_dirs: []
  # Key documentation files for this project (referenced in prompt context).
  # Note: dynamic source/doc file counts are computed at workflow run time from
  # the filesystem and will reflect the live state — no manual updates needed.
  key_docs:
    - README.md
    - ARCHITECTURE.md
    - FUNCTIONAL_REQUIREMENTS.md
    - CONTRIBUTING.md
    - CHANGELOG.md

workflow:
  stages:
    quick:
      enabled: true
      steps:
        - step_00  # pre-analysis / environment scan
        - step_01  # documentation analysis
        - step_02  # consistency analysis
    medium:
      enabled: true
      steps:
        - step_00  # pre-analysis / environment scan
        - step_01  # documentation analysis
        - step_02  # consistency analysis
        - step_03  # script reference analysis
        - step_04  # config validation
        - step_05  # directory structure validation
    full:
      enabled: true
      steps:
        - step_00  # pre-analysis / environment scan
        - step_01  # documentation analysis
        - step_02  # consistency analysis
        - step_03  # script reference analysis
        - step_04  # config validation
        - step_05  # directory structure validation
        - step_06  # integration tests (type-check)
        - step_07  # coverage report generation
        - step_08  # release readiness check
        - step_0f  # artifact commit: versions and commits all workflow outputs

validation:
  documentation:
    required: true
    min_coverage: 70
  testing:
    required: true
    min_coverage: 70  # jest --coverage threshold

linting:
  md_linter: "none"     # no markdown linter configured
  md_glob: "**/*.md"
  md_excludes:
    - "node_modules/**"
    - ".ai_workflow/**"
    - "dist/**"

git:
  tag_on_run: false     # tagging handled manually; disable during workflow runs

# Per-step prompt guidance — consumed by ai_workflow.js when building step prompts.
# These entries tighten the instructions that the documentation_expert persona
# receives, reflecting lessons from the 2026-03-29 run analysis.
step_overrides:
  step_01:                    # documentation analysis (documentation_expert)
    task_scope:
      # Explicitly list the documentation files eligible for edits in this step.
      # Only files in this list may receive before/after edit blocks.
      # All other files are read-only context regardless of what the diff shows.
      eligible_docs:
        - README.md
        - ARCHITECTURE.md
        - FUNCTIONAL_REQUIREMENTS.md
        - CONTRIBUTING.md
        - CHANGELOG.md
        - API.md
        - GETTING_STARTED.md
      # Before editing any file, the persona MUST verify the change satisfies at
      # least one of the criteria below.  "Looks incomplete" is not sufficient.
      # See CONTRIBUTING.md §Documentation Audience and §Code Documentation Standards.
      standards_reference: "CONTRIBUTING.md §Documentation Audience, §Code Documentation Standards, §Cross-Reference Conventions"
      valid_update_criteria:
        - correctness_error: >
            The documentation contains a factual error or directly contradicts the
            current codebase (e.g., wrong flag name, incorrect module path, stale
            architecture description).
        - outdated_feature_description: >
            A feature, CLI flag, or behaviour described in the docs no longer matches
            what the changed source files implement.
        - missing_jsdoc_on_new_export: >
            A newly added or modified exported function, class, or interface in the
            changed files lacks a JSDoc block entirely (breaks IDE hover docs and
            AI autocomplete — see CONTRIBUTING.md §Exported functions).
        - broken_cross_reference: >
            A link or section reference in a documentation file points to a file,
            heading, or anchor that no longer exists after the current changes.
        - changelog_entry_missing: >
            The changed files introduce a user-visible feature, fix, or breaking
            change that is not yet recorded in CHANGELOG.md.
      # Do NOT edit documentation files speculatively or for style reasons alone.
      # Silence is correct when no criterion above is met.
      block_speculative_edits: true
  step_02:                    # consistency analysis (documentation_expert)
    quality_checks:
      cross_reference_flagging:
        # Only raise a missing-cross-reference finding when the filename pairing
        # strongly implies a documented relationship — e.g. a source file and a
        # same-stem doc file: `metrics_parser.ts` ↔ `metrics_parser.md`.
        # Do NOT flag loosely related filenames or infer relationships from
        # directory co-location alone.
        require_strong_filename_pattern: true
        example_valid_pair: "module.ts + module.md (same stem, different extension)"
        example_invalid_pair: "CHANGELOG.md + README.md (different purposes, no implicit link)"
      speculative_findings:
        # Outdated version numbers and missing feature docs MUST NOT be flagged
        # unless the evidence appears explicitly in the broken-refs scan or the
        # provided filenames list.  Silence is correct when content has not been shown.
        block_version_speculation: true
        block_feature_doc_speculation: true
  step_0b:                    # documentation generation (technical_writer)
    necessity_criteria:
      # This is a developer-facing tool with NO external end-users.
      # All prose docs (ARCHITECTURE, FUNCTIONAL_REQUIREMENTS, CONTRIBUTING) target
      # internal contributors and AI agents — see CONTRIBUTING.md §Documentation Audience.
      # Before generating anything, the persona MUST consult the audience table in
      # CONTRIBUTING.md and confirm the new content serves a defined internal purpose.
      audience: "internal contributors and AI agents only — never end-users"
      audience_table_check_required: true
      # Concrete triggers that make new documentation NECESSARY for this project.
      # At least one must be true before generating; silence is correct otherwise.
      generate_triggers:
        - missing_module_header: >
            A src/ file is missing its opening JSDoc block with @module path
            (required by CONTRIBUTING.md §Code Documentation Standards — highest-priority gap).
        - missing_exported_jsdoc: >
            An exported function, class, or interface has no JSDoc block at all
            (not merely a style concern — breaks IDE hover docs and AI autocomplete).
        - contradicts_contributing: >
            Existing doc content is factually wrong or directly contradicts a rule
            stated in CONTRIBUTING.md (e.g., wrong audience targeting, incorrect
            terminology vs. Glossary, wrong import extension guidance).
        - wrong_audience_targeting: >
            An existing doc is written for end-users rather than internal contributors
            (e.g., installation-focused language in a file that should describe internals).
      # Prose doc files (ARCHITECTURE, FUNCTIONAL_REQUIREMENTS, CONTRIBUTING) must NOT
      # be generated or updated unless a trigger above is met AND the change has been
      # verified against CONTRIBUTING.md.  "Looks incomplete" is not sufficient.
      block_speculative_prose: true
